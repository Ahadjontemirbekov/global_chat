<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Global Chat{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold">
                <i class="fas fa-comments mr-2"></i>Global Chat
            </div>
            <div class="space-x-4">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}" class="hover:text-blue-200">Dashboard</a>
                    <a href="{% url 'chat' %}" class="hover:text-blue-200">Chat</a>
                    <a href="{% url 'logout' %}" class="hover:text-blue-200">Chiqish</a>
                {% else %}
                    <a href="{% url 'login' %}" class="hover:text-blue-200">Kirish</a>
                    <a href="{% url 'signup' %}" class="hover:text-blue-200">Ro'yxatdan o'tish</a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% if messages %}
        <div class="container mx-auto px-4 py-4">
            {% for message in messages %}
                <div class="alert alert-{% if message.tags %}{{ message.tags }}{% else %}info{% endif %} p-4 rounded mb-4 bg-blue-100 text-blue-800 border border-blue-300">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-800 text-white text-center py-4 mt-12">
        <p>&copy; 2026 Global Chat. Barcha huquqlar himoyalangan.</p>
    </footer>
</body>
</html>
