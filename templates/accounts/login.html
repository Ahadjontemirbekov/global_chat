{% extends 'base.html' %}

{% block title %}Kirish - Global Chat{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8 mt-10">
    <h2 class="text-3xl font-bold mb-6 text-center">Kirish</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        
        <div>
            <label for="id_username" class="block text-gray-700 font-bold mb-2">Foydalanuvchi nomi:</label>
            {{ form.username }}
        </div>

        <div>
            <label for="id_password" class="block text-gray-700 font-bold mb-2">Parol:</label>
            {{ form.password }}
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700">
            Kirish
        </button>
    </form>
    <p class="text-center mt-4 text-gray-600">
        Akkauntingiz yo'qmi? <a href="{% url 'signup' %}" class="text-blue-600 font-bold">Ro'yxatdan o'tish</a>
    </p>
</div>
{% endblock %}
